<section class="about section-padding" id="about">
    <div class="container contact-container">
        <div class="contact-info">
            <h2>Contact Us</h2>

            <h3>GO DIGITAL TECHNOLOGY</h3>
            <p>
                220, Mahadev Nagar Society,<br />
                Eshwar Nagar,<br />
                Godadara,<br />
                Surat 395012 Gujarat – INDIA
            </p>

            <p><strong>Mobile:</strong> +91 72848 34963</p>
            <p><strong>Email:</strong> info@godigitaltechnology.com</p>
            <p><strong>Website:</strong> www.godigitaltechnology.com</p>
            <div class="map-container">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d462.10034608479975!2d72.86503465457497!3d21.174697354159868!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be04fc674eb2a2b%3A0xe438856c8cac33a1!2sMahadev%20Nagar%20Society%2C%20220%2C%20Eshwar%20Nagar%2C%20Godadara%2C%20Limbayat%2C%20Surat%2C%20Gujarat%20395012!5e0!3m2!1sen!2sin!4v1777643985879!5m2!1sen!2sin"
                    height="450" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
        <div class="contact-form">
            <h3>Online Inquiry Form</h3>

            <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
                <input type="text" name="name" [(ngModel)]="formData.name" placeholder="Your Name" required />
                <input type="email" name="email" [(ngModel)]="formData.email" placeholder="Your Email" required />
                <input type="text" name="mobile" [(ngModel)]="formData.mobile" placeholder="Your Mobile Number"
                    required />
                <input type="text" name="subject" [(ngModel)]="formData.subject" placeholder="Subject" />

                <textarea name="message" [(ngModel)]="formData.message" placeholder="Your Message" rows="6"></textarea>

                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</section>
