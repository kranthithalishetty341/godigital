<section class="about section-padding" id="about">
    <div class="container about-wrapper">
        <h1 class="page-title">Our Work</h1>
        <p>Click on below categories to view 360 Virtual Tour’s examples.</p>
        <section class="gallery-section">
            <div class="filter-wrapper">
                @for(category of categories; track category){
                    <button class="filter-btn"
                        [class.active]="activeCategory === category" (click)="setCategory(category)">
                        {{ category }}
                    </button>
                }
            </div>
            <div class="container-fluid">
                <div class="row g-4">
                    @for(item of filteredItems; track item.title){
                    <div class="col-lg-4 col-md-6">
                        <div class="gallery-card" >
                            <img [src]="item.image" [alt]="item.title" />
                            <div class="overlay">
                                <div class="overlay-content">
                                    <h3>
                                        {{ item.title }}
                                    </h3>
                                    <span>
                                        View Project →
                                    </span>
                                </div>
                            </div>
                            <div class="shine"></div>
                        </div>
                    </div>
                }
                </div>
            </div>
        </section>
       
    </div>
</section>
